name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/issue_tracker
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/issue_tracker_test
      SECRET_KEY: test-secret-key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test databases
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE issue_tracker;"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE issue_tracker_test;"

      - name: Run Alembic migrations
        run: |
          alembic upgrade head

      - name: Run tests
        run: |
          pytest -v