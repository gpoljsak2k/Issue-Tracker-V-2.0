services:
  db:
    image: postgres:16
    container_name: issue_tracker_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: issue_tracker_web
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/issue_tracker
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/issue_tracker_test
      SECRET_KEY: change-this-to-a-very-long-random-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    volumes:
      - .:/app

volumes:
  postgres_data: